<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Platform V2</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:sans-serif;
    text-align:center;
    padding:20px;
}

.box{
    max-width:400px;
    margin:auto;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

input,button{
    width:90%;
    padding:12px;
    margin:8px;
    border-radius:8px;
    border:none;
}

button{
    background:#10b981;
    color:white;
    font-weight:bold;
}

#status{
    color:#34d399;
}
</style>

</head>

<body>

<div class="box">

<h1>🚀 Happy Platform V2</h1>

<p id="status">
Firebase ချိတ်ဆက်ရန် အသင့်
</p>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="registerUser()">အကောင့်ဖွင့်မည်</button>

<button onclick="loginUser()">Login ဝင်မည်</button>

<button onclick="logoutUser()">Logout</button>

</div>


<script>

const firebaseConfig = {
apiKey: "AIzaSyCgamnl5ZozPJpPJ5hzbpgGeYm-hXdl8Ug",
authDomain: "happy-platform-eb6c1.firebaseapp.com",
databaseURL: "https://happy-platform-eb6c1-default-rtdb.firebaseio.com",
projectId: "happy-platform-eb6c1",
storageBucket: "happy-platform-eb6c1.firebasestorage.app",
messagingSenderId: "989734830184",
appId: "1:989734830184:web:69a30b6f84643c14303bdd"
};


firebase.initializeApp(firebaseConfig);


function registerUser(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;


firebase.auth()
.createUserWithEmailAndPassword(email,password)

.then(()=>{

document.getElementById("status").innerHTML=
"✅ Account ဖွင့်ပြီးပါပြီ";

})

.catch(error=>{

alert(error.message);

});

}



function loginUser(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;


firebase.auth()
.signInWithEmailAndPassword(email,password)

.then(()=>{

document.getElementById("status").innerHTML=
"✅ Login အောင်မြင်ပါပြီ";

})

.catch(error=>{

alert(error.message);

});

}



function logoutUser(){

firebase.auth().signOut();

document.getElementById("status").innerHTML=
"👋 Logout ပြုလုပ်ပြီးပါပြီ";

}


firebase.auth().onAuthStateChanged(user=>{

if(user){

document.getElementById("status").innerHTML=
"👤 ဝင်ထားသော User : "+user.email;

}

});
    

</script>

</body>
  </html>
